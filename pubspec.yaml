name: real_page_flip
description: >
  A professional, high-fidelity 3D-like page flip engine for Flutter. 
  Features physics-based 2D paper fold effects with realistic shadows, 
  specular highlights, and integrated sound/haptic feedback. 
  Engineered for stable 60FPS performance and robust layout 
  constraint handling to prevent common Flutter layout errors.
version: 1.2.1
repository: https://github.com/ChaPDCha/flutter_real_page_flip.git
homepage: https://github.com/ChaPDCha/flutter_real_page_flip
issue_tracker: https://github.com/ChaPDCha/flutter_real_page_flip/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.5.1
  vibration: ^3.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  assets:
    - assets/sounds/page_flip.mp3


