    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  real_page_flip:
    path: ../
  cupertino_icons: ^1.0.8
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path: ^1.9.0
  image: ^3.3.0
