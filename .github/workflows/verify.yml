name: Verify Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Generate coverage summary
        run: |
          echo "Coverage report generated at coverage/lcov.info"
          if command -v lcov &> /dev/null; then
            genhtml coverage/lcov.info -o coverage/html
            echo "HTML coverage report available at coverage/html/index.html"
          else
            echo "lcov not installed; skipping HTML report generation."
          fi

      - name: Test count regression check
        run: |
          BASELINE=448
          MINIMUM=440
          TEST_OUTPUT=$(flutter test 2>&1 | tail -5)
          echo "$TEST_OUTPUT"
          # Extract number of passed tests from output line like "+448" or "448 tests passed"
          if echo "$TEST_OUTPUT" | grep -qE '\+[0-9]+'; then
            COUNT=$(echo "$TEST_OUTPUT" | grep -oE '\+([0-9]+)' | grep -oE '[0-9]+' | head -1)
          elif echo "$TEST_OUTPUT" | grep -qE '([0-9]+) tests? passed'; then
            COUNT=$(echo "$TEST_OUTPUT" | grep -oE '[0-9]+ tests? passed' | grep -oE '[0-9]+')
          else
            COUNT=0
          fi
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt "$MINIMUM" ]; then
            echo "ERROR: Test count ($COUNT) dropped below minimum ($MINIMUM)"
            exit 1
          fi
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "WARNING: Test count ($COUNT) is below baseline ($BASELINE) — consider adding tests for new code."
          else
            echo "Test count ($COUNT) at or above baseline ($BASELINE)."
          fi

      - name: Check publishing readiness
        run: dart pub publish --dry-run
