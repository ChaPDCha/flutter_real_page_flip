name: Flutter CI

# Manual only — do not auto-run on push/PR. Trigger via Actions UI or:
#   gh workflow run "Flutter CI"
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Analyze example app
        run: |
          cd example
          flutter pub get
          flutter analyze

      - name: Build web (package only)
        run: |
          cd example
          flutter build web --no-pub

      - name: Build Android example
        working-directory: example
        run: flutter build apk --debug --no-pub

      - name: Run Android plugin unit tests
        working-directory: example/android
        run: ./gradlew testDebugUnitTest

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Disable experimental Swift Package Manager path
        run: flutter config --no-enable-swift-package-manager

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build iOS simulator example
        working-directory: example
        run: flutter build ios --simulator --no-codesign --no-pub
